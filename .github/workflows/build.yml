name: Android Release Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.7'

    - name: Generate Keystore
      run: |
        keytool -genkey -v -keystore release.jks -alias securecam -keyalg RSA -keysize 2048 -validity 10000 -storepass "${{ secrets.KEYSTORE_PASSWORD }}" -keypass "${{ secrets.KEYSTORE_PASSWORD }}" -dname "CN=AI CCTV, OU=Android, O=SecureCam, C=IN"
        
    - name: Build Release AAB
      run: ./gradlew bundleRelease

    - name: Sign AAB
      run: |
        jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore release.jks -storepass "${{ secrets.KEYSTORE_PASSWORD }}" app/build/outputs/bundle/release/app-release.aab securecam

    - name: Upload Signed AAB
      uses: actions/upload-artifact@v4
      with:
        name: SecureCam-Release-AAB
        path: app/build/outputs/bundle/release/app-release.aab

    - name: Upload Keystore (CRITICAL BACKUP)
      uses: actions/upload-artifact@v4
      with:
        name: SecureCam-Keystore-Backup
        path: release.jks